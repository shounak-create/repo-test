<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard</title>


  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />


  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    rel="stylesheet"
  />

  <style>
    body {
      background-color: #f4f6f9;
    }

    .sidebar {
      min-height: 100vh;
      background-color: #212529;
    }

    .sidebar a {
      color: #adb5bd;
      text-decoration: none;
      display: block;
      padding: 12px 20px;
    }

    .sidebar a:hover,
    .sidebar a.active {
      background-color: #343a40;
      color: #fff;
    }

    .stat-card {
      border: none;
      border-radius: 12px;
    }

    .icon-box {
      width: 50px;
      height: 50px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: #fff;
    }
  </style>
</head>
<body>

<div class="container-fluid">
  <div class="row">

    <nav class="col-lg-2 col-md-3 d-md-block sidebar collapse">
      <div class="pt-4">
        <h4 class="text-white text-center mb-4">Admin Panel</h4>
        <a class="active" href="#"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>

      </div>
    </nav>


    <main class="col-lg-10 col-md-9 ms-sm-auto px-4">

      <nav class="navbar navbar-light bg-white shadow-sm rounded my-3">
        <div class="container-fluid">
          <button
            class="btn btn-dark d-md-none"
            data-bs-toggle="collapse"
            data-bs-target=".sidebar"
          >
            <i class="bi bi-list"></i>
          </button>
          <span class="navbar-brand mb-0 h5">Dashboard Overview</span>
          <div class="d-flex align-items-center">
            <i class="bi bi-bell fs-5 me-3"></i>
            <img
              src="https://via.placeholder.com/40"
              class="rounded-circle"
              alt="Admin"
            />
          </div>
        </div>
      </nav>


      <div class="row g-4">

        <div class="col-lg-4 col-md-6">
          <div class="card stat-card shadow-sm p-3">
            <div class="d-flex justify-content-between align-items-center">
              <div>
                <h6>Total Students</h6>
                <h3>2,450</h3>
              </div>
              <div class="icon-box bg-primary">
                <i class="bi bi-people"></i>
              </div>
            </div>
          </div>
        </div>


        <div class="col-lg-4 col-md-6">
          <div class="card stat-card shadow-sm p-3">
            <div class="d-flex justify-content-between align-items-center">
              <div>
                <h6>Revenue</h6>
                <h3>₹8.5L</h3>
              </div>
              <div class="icon-box bg-warning">
                <i class="bi bi-currency-rupee"></i>
              </div>
            </div>
          </div>
        </div>

        <div class="col-lg-4 col-md-6">
          <div class="card stat-card shadow-sm p-3">
            <div class="d-flex justify-content-between align-items-center">
              <div>
                <h6>Active Exams</h6>
                <h3>18</h3>
              </div>
              <div class="icon-box bg-danger">
                <i class="bi bi-pencil-square"></i>
              </div>
            </div>
          </div>
        </div>

      </div>

      <div class="card mt-5 shadow-sm">
        <div class="card-header bg-white">
          <h5 class="mb-0">Recent Activities</h5>
        </div>
        <div class="table-responsive">
          <table class="table table-striped mb-0">
            <thead class="table-dark">
              <tr>
                <th>#</th>
                <th>Name</th>
                <th>Type</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>1</td>
                <td>John Doe</td>
                <td>Student</td>
                <td><span class="badge bg-success">Active</span></td>
              </tr>
              <tr>
                <td>2</td>
                <td>Math Exam</td>
                <td>Exam</td>
                <td><span class="badge bg-info">Completed</span></td>
              </tr>
              <tr>
                <td>3</td>
                <td>Order #458</td>
                <td>Purchase</td>
                <td><span class="badge bg-info">Completed</span></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
