<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Display User</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">
        <h2 class="text-center mb-4">User Data</h2>


    <div class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" id="d_name" class="form-control" readonly>
    </div>

    <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" id="d_email" class="form-control" readonly>
    </div>

    <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="text" id="d_password" class="form-control" readonly>
    </div>

    <button id="loadDataBtn" class="btn btn-success w-100">
        Display Data
    </button>
</div>


</div>

<script src="script.js"></script>

</body>
</html>
